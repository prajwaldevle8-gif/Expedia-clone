<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expedia Account Login</title>
    <link rel="shortcut icon" href="./assets/expidia.logo.webp" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form action="#">
        <img id="first_logo" src="./assets/onekey__expedia.svg" alt="Expedia Logo">
        <h1>Sign in or create an account</h1>
        <p>Unlock a world of rewards with one account across Expedia, Hotels.com, and Vrbo.</p>
        <div class="btn">
            <img src="./assets/google.svg" alt="logo">
            <button>Sing in with Google</button>
        </div>

        <div id="center">
            <p style="color: grey; cursor: pointer;">or</p>
            <input type="text" placeholder="  Email" id="input">
            <div id="btn_two">
                <button>Continue</button>
            </div>
            <p style="color: grey; cursor: pointer;">Other ways to sign in</p>
        </div>

        <div class="btn_three">
            <img src="./assets/apple.svg" alt="apple">
            <button>Continue with Apple</button>
        </div>

        <div class="btn_three">
            <img src="./assets/facebook.svg" alt="facebook">
            <button>Continue with Facebook</button>
        </div>

        <p id="foot_para">By continuing, you have read and agree to our <a href="#">Terms and Conditions, Privacy
                Statement,</a> and
            <a href="#">Rewards Terms.</a>
        </p>

        <div id="footer">
            <img src="./assets/onekey__expedia (1).svg" alt="logo1">
            <img src="./assets/onekey__hotels__english.svg" alt="logo2">
            <img src="./assets/onekey__vrbo.svg" alt="logo3">
        </div>
    </form>
</body>

</html>
